<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FakeNews Detector — Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
  <!-- Pre-paint theme: synchronous read from sessionStorage prevents FOUC on repeat opens -->
  <script>
    try {
      var _t = sessionStorage.getItem("theme_resolved");
      if (_t === "dark" || _t === "light") document.documentElement.setAttribute("data-theme", _t);
    } catch {}
  </script>
</head>
<body>

  <div class="panel-header">
    <div class="panel-title">FakeNews Detector</div>
    <div id="overall-chip" class="overall-chip none">Sin análisis</div>
    <div class="confidence-line" id="overall-confidence"></div>
    <div class="status-line" id="status-line">Esperando análisis…</div>
    <div class="vu-meter-row" id="vu-meter-row">
      <span class="vu-label" id="vu-label">Nivel de audio</span>
      <div class="vu-bars" id="vu-bars"></div>
    </div>
  </div>

  <div class="panel-toolbar">
    <button class="btn-clear" id="btn-clear">Limpiar</button>
  </div>

  <div class="claims-list" id="claims-list">
    <div class="empty-state">
      Inicia un análisis desde el popup para ver los resultados aquí.
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
