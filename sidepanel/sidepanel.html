<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FakeNews Detector — Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
  <!-- Pre-paint theme (external script — MV3 CSP blocks inline scripts) -->
  <script src="../lib/theme-preload.js"></script>
</head>
<body>

  <!-- Header — always visible in all views -->
  <div class="panel-header">
    <div class="panel-title-row">
      <div class="panel-title">FakeNews Detector</div>
      <a class="donate-chip" id="donate-chip" target="_blank" rel="noopener noreferrer"
         title="Apoya el desarrollo de esta extensión"></a>
    </div>
    <div id="overall-chip" class="overall-chip none">Sin análisis</div>
    <div class="confidence-line" id="overall-confidence"></div>
    <div class="status-line" id="status-line">Esperando análisis…</div>
    <div class="vu-meter-row" id="vu-meter-row">
      <span class="vu-label" id="vu-label">Nivel de audio</span>
      <div class="vu-bars" id="vu-bars"></div>
    </div>
  </div>

  <!-- Toolbar — always visible in all views -->
  <div class="panel-toolbar">
    <button class="btn-toolbar btn-clear" id="btn-clear" title="Reinicia la sesión de esta pestaña: detiene el análisis y borra resultados e historial">Reiniciar</button>
    <div class="toolbar-nav-group">
      <button class="btn-toolbar btn-history" id="btn-history">Historial</button>
      <button class="btn-toolbar btn-conclusion" id="btn-conclusion">Conclusión</button>
    </div>
  </div>

  <!-- VIEW A: Resultados (default) -->
  <div id="results-view" class="view-container">
    <div class="claims-list" id="claims-list">
      <div class="empty-state">
        Inicia un análisis desde el popup para ver los resultados aquí.
      </div>
    </div>
  </div>

  <!-- VIEW B: Conclusión -->
  <div id="conclusion-view" class="view-container" hidden>
    <div class="view-header">
      <button class="btn-back" id="btn-back-from-conclusion">← Resultados</button>
      <span class="view-title">Conclusión de la sesión</span>
    </div>
    <div class="view-body">
      <div class="conclusion-stats" id="conclusion-stats"></div>
      <div id="conclusion-body"></div>
    </div>
  </div>

  <!-- VIEW C: Historial -->
  <div id="history-view" class="view-container" hidden>
    <div class="view-header">
      <button class="btn-back" id="btn-back-from-history">← Resultados</button>
      <span class="view-title">Historial de la sesión</span>
    </div>
    <div class="view-body">
      <div id="history-list"></div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
